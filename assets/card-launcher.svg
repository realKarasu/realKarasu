<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 130" width="380" height="130" role="img" aria-label="Launcher-Karamon — Launcher officiel du projet Karamon">
  <title>Launcher-Karamon — Launcher officiel du projet Karamon</title>
  <defs>
