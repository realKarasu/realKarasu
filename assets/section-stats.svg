<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 72" width="440" height="72" role="img" aria-label="Stats">
  <title>Stats</title>
  <defs>
    <clipPath id="pill"><rect x="20" y="12" width="400" height="48" rx="24" ry="24"/></clipPath>
    <radialGradient id="b1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A6467E"/><stop offset="1" stop-color="#A6467E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7B245B"/><stop offset="1" stop-color="#7B245B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="17"/></filter>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#pill)">
    <rect x="20" y="12" width="400" height="48" fill="#150611"/>
    <g filter="url(#blur)">
      <circle cx="150" cy="38" r="58" fill="url(#b2)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 60,6; -24,-6; 0,0" keyTimes="0;0.33;0.66;1" dur="9s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="34" r="54" fill="url(#b1)">
        <animateTransform attributeName="transform" type="translate" values="0,0; -50,8; 28,-5; 0,0" keyTimes="0;0.33;0.66;1" dur="11s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      </circle>
    </g>
    <rect x="20" y="12" width="400" height="48" fill="url(#face)"/>
    <rect x="-150" y="12" width="150" height="48" fill="url(#sweep)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 620,0" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="20.5" y="12.5" width="399" height="47" rx="23.5" ry="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
  <text x="220" y="42" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="5" fill="#ffffff">STATS</text>
</svg>
